<div id="screen-12" class="screen" style="background:#f8f9fa;">

    <!-- ── Empty state ── -->
    <div id="historyEmptyState"

        data-en="Click «+ New import» to upload your first file and get started."></div>

    <!-- ── Active import in progress ── -->
    <div id="historyActiveImport" style="display:none;
      background:#fff;border-radius:12px;border-left:4px solid var(--olx-teal-dark);
      box-shadow:0 2px 8px rgba(0,0,0,.07);padding:1rem 1.25rem;margin-bottom:1rem;">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
        <div>
          <div class="d-flex align-items-center gap-2 mb-1">
            <i class="bi bi-clock-history" style="color:#f59e0b;"></i>
            <strong id="historyActiveFileName"></strong>
            <span id="historyActivePlatform"></span>
            <span class="badge-status" data-ua="В процесі" data-en="In progress"></span>
          </div>
          <div style="font-size:.85rem;color:#666;">
            <span data-ua="Обробляється:" data-en="Processing:"></span>
            <span id="historyProgressCount">0</span> / 146
            <span data-ua="оголошень" data-en="listings"></span>
          </div>
        </div>
        <div style="min-width:200px;">
          <div style="background:#e0e0e0;border-radius:4px;height:8px;overflow:hidden;margin-bottom:.25rem;">
            <div id="historyProgressBar" style="width:0%;height:100%;background:var(--olx-teal-dark);border-radius:4px;transition:width .15s linear;"></div>
          </div>
          <small style="color:#888;font-size:.78rem;">
            <span id="historyProgressPercent">0%</span>
          </small>
        </div>
      </div>
    </div>
