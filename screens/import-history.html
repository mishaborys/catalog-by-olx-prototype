<!-- ═══════════════════════════════════════
     SCREEN 12 — ІСТОРІЯ ІМПОРТУ
════════════════════════════════════════ -->
<div id="screen-12" class="screen" style="background:#f8f9fa;">
  <div data-component="app-header"></div>

  <div style="flex:1;padding:2rem 2.5rem;max-width:1100px;margin:0 auto;width:100%;">

    <div class="d-flex align-items-center justify-content-between mb-4">
      <h4 class="fw-bold mb-0" data-ua="Історія імпорту" data-en="Import History"></h4>
      <button class="btn-dark-olx" style="width:auto;padding:.6rem 1.25rem;" onclick="showScreen(6)"
        data-ua="+ Новий імпорт" data-en="+ New import"></button>
    </div>

    <!-- ── Empty state ── -->
    <div id="historyEmptyState"
      style="display:flex;flex-direction:column;align-items:center;justify-content:center;
             padding:5rem 2rem;text-align:center;gap:1rem;">
      <i class="bi bi-inbox" style="font-size:3rem;color:#ccc;"></i>
      <div style="font-weight:600;font-size:1rem;color:#555;"
        data-ua="Тут відображатиметься ваша історія імпорту"
        data-en="Your import history will appear here"></div>
      <div style="font-size:.88rem;color:#aaa;max-width:340px;"
        data-ua="Натисніть «+ Новий імпорт», щоб завантажити перший файл і розпочати."
        data-en="Click «+ New import» to upload your first file and get started."></div>
    </div>

    <!-- ── Active import in progress ── -->
    <div id="historyActiveImport" style="display:none;margin-bottom:.75rem;">

      <!-- Main progress card -->
      <div style="background:#fff;border-radius:12px;border-left:4px solid var(--olx-teal-dark);
                  box-shadow:0 2px 8px rgba(0,0,0,.07);padding:1.1rem 1.25rem;margin-bottom:.5rem;">
        <div class="d-flex align-items-start justify-content-between flex-wrap gap-3">
          <div style="flex:1;">
            <!-- File + platform + status -->
            <div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:.5rem;">
              <i class="bi bi-clock-history" style="color:#f59e0b;"></i>
              <strong id="historyActiveFileName"></strong>
              <span id="historyActivePlatform" style="display:inline-flex;align-items:center;"></span>
              <span class="badge-active" style="display:inline-flex;align-items:center;" data-ua="В процесі" data-en="In progress"></span>
            </div>
            <!-- Processing count -->
            <div style="font-size:.85rem;color:#666;margin-bottom:.35rem;">
              <span data-ua="Обробляється:" data-en="Processing:"></span>
              <span id="historyProgressCount">0</span> / 146
              <span data-ua="оголошень" data-en="listings"></span>
            </div>
            <!-- Success / failed live counts -->
            <div style="font-size:.82rem;display:flex;gap:1rem;">
              <span style="color:#2e7d32;">
                <i class="bi bi-check-circle-fill" style="font-size:.78rem;margin-right:3px;"></i>
                <span data-ua="Опубліковано:" data-en="Published:"></span>
                <strong id="historyProgressSuccess">0</strong>
              </span>
              <span style="color:#c62828;">
                <i class="bi bi-x-circle-fill" style="font-size:.78rem;margin-right:3px;"></i>
                <span data-ua="Помилки:" data-en="Failed:"></span>
                <strong id="historyProgressFailed">0</strong>
              </span>
            </div>
          </div>
          <!-- Progress bar + ETA -->
          <div style="min-width:200px;align-self:center;">
            <div style="background:#e0e0e0;border-radius:4px;height:8px;overflow:hidden;margin-bottom:.3rem;">
              <div id="historyProgressBar" style="width:0%;height:100%;background:var(--olx-teal-dark);border-radius:4px;transition:width .15s linear;"></div>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <small style="color:#888;font-size:.78rem;"><span id="historyProgressPercent">0%</span></small>
              <small style="color:#aaa;font-size:.78rem;">
                <span data-ua="~" data-en="~"></span><span id="historyProgressEta">—</span><span data-ua=" хв" data-en=" min"></span>
              </small>
            </div>
          </div>
        </div>
      </div>

      <!-- Email notification info block -->
      <div class="status-block info" style="width:100%;margin-bottom:1rem;box-sizing:border-box;">
        <i class="bi bi-envelope-fill"></i>
        <span data-ua="Після завершення обробки всіх оголошень ми надішлемо вам листа на email."
              data-en="Once all listings are processed, we will send you a confirmation email."></span>
      </div>

    </div>

    <!-- ── History table ── -->
    <div id="historyTableWrap" style="display:none;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.07);overflow:hidden;">
      <table style="width:100%;border-collapse:collapse;">

          <tr style="background:#f8f9fa;border-bottom:1px solid #e0e0e0;">

            <th class="tbl-h" data-ua="Успішно" data-en="Success"></th>
            <th class="tbl-h" data-ua="Помилки" data-en="Failed"></th>
            <th class="tbl-h" data-ua="Дата додавання" data-en="Added at"></th>
            <th class="tbl-h" data-ua="Дії" data-en="Actions"></th>
          </tr>
        </thead>
        <tbody>

            <td class="tbl-c"><a class="tbl-link" onclick="showScreen(8)" data-ua="Переглянути помилки" data-en="View errors"></a></td>
          </tr>
          <!-- Completed — no errors → no action -->
          <tr class="tbl-row">
            <td class="tbl-c"><i class="bi bi-file-earmark-excel" style="color:#217346;margin-right:6px;"></i>avto_export_28032026.xlsx</td>
            <td class="tbl-c"><span class="badge-platform avto">AVTO.pro</span></td>
            <td class="tbl-c"><span class="badge-success" data-ua="Завершено" data-en="Completed"></span></td>
            <td class="tbl-c">89</td>
            <td class="tbl-c" style="color:#2e7d32;font-weight:500;">89</td>

            <td class="tbl-c" style="white-space:nowrap;">28.03.2026<br><span style="font-size:.78rem;color:#aaa;">09:15</span></td>
            <td class="tbl-c" style="color:#aaa;">—</td>
          </tr>
          <!-- In queue -->
          <tr class="tbl-row">
            <td class="tbl-c"><i class="bi bi-file-earmark-excel" style="color:#217346;margin-right:6px;"></i>prom_export_15032026.xlsx</td>
            <td class="tbl-c"><span class="badge-platform prom">PROM.ua</span></td>
            <td class="tbl-c"><span class="badge-status" data-ua="В черзі" data-en="In queue"></span></td>
            <td class="tbl-c">56</td>

            <td class="tbl-c" style="color:#aaa;">—</td>
            <td class="tbl-c" style="white-space:nowrap;">15.03.2026<br><span style="font-size:.78rem;color:#aaa;">11:47</span></td>

      </table>
    </div>

  </div>
