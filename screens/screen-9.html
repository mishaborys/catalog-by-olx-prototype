<!-- ═══════════════════════════════════════
     SCREEN 9 — НАЛАШТУВАННЯ
════════════════════════════════════════ -->
<div id="screen-9" class="screen">
  <div class="app-header">
    <span class="app-logo">catalog<span class="dot">.</span><span class="by"> by OLX</span></span>
    <div class="hdr-dropdown">
      <button class="hdr-dropdown-btn" onclick="toggleDrop('drop9')">
        <span data-ua="Мій профіль" data-en="My Profile"></span>
        <i class="bi bi-chevron-down" style="font-size:.7rem;"></i>
      </button>
      <div class="hdr-dropdown-menu" id="drop9">
        <div class="hdr-drop-item" onclick="showScreen(6);closeDrop()">
          <i class="bi bi-house me-2"></i><span data-ua="Кабінет" data-en="Cabinet"></span>
        </div>
        <div class="hdr-drop-item" onclick="showScreen(1);closeDrop()">
          <i class="bi bi-box-arrow-right me-2"></i><span data-ua="Вийти" data-en="Sign out"></span>
        </div>
      </div>
    </div>
  </div>

  <div style="flex:1;background:#f8f9fa;padding:1.5rem;overflow-y:auto;">
    <div style="max-width:900px;margin:0 auto;display:flex;gap:1.5rem;align-items:flex-start;">

      <div style="width:210px;flex-shrink:0;">
        <div style="font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;
                    color:#999;font-weight:600;margin-bottom:.75rem;padding:0 .5rem;"
          data-ua="Налаштування" data-en="Settings"></div>
        <nav style="display:flex;flex-direction:column;gap:2px;">
          <button id="s9nav_olx" class="sett-nav active-sett" onclick="s9Tab('olx')">
            <i class="bi bi-arrow-repeat me-2"></i>
            <span data-ua="Синхронізація з OLX" data-en="OLX Sync"></span>
          </button>
          <button id="s9nav_contacts" class="sett-nav" onclick="s9Tab('contacts')">
            <i class="bi bi-person me-2"></i>
            <span data-ua="Контактні дані" data-en="Contact Details"></span>
          </button>
          <button id="s9nav_avto" class="sett-nav" onclick="s9Tab('avto')">
            <i class="bi bi-card-text me-2"></i>
            <span data-ua="Опис для AVTO.pro" data-en="AVTO.pro Description"></span>
          </button>
          <button id="s9nav_pw" class="sett-nav" onclick="s9Tab('pw')">
            <i class="bi bi-key me-2"></i>
            <span data-ua="Зміна пароля" data-en="Change Password"></span>
          </button>
        </nav>
      </div>

      <div style="flex:1;background:#fff;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.07);padding:2rem;">

        <div id="s9_olx">
          <div class="d-flex align-items-center justify-content-between mb-1">
            <h5 class="fw-bold mb-0" data-ua="Синхронізація з OLX" data-en="OLX Sync"></h5>
            <button class="cb" style="position:static;transform:none;margin-left:.5rem;"
              onclick="showComment('s9_del_acc')"><i class="bi bi-chat-fill"></i></button>
          </div>
          <p class="text-muted mb-4" style="font-size:.88rem;"
            data-ua="Управляйте підключенням між вашим акаунтом Content Manager і OLX."
            data-en="Manage the connection between your Content Manager and OLX accounts."></p>
          <div class="sync-ok-block mb-4">
            <i class="bi bi-check-circle-fill"></i>
            <span data-ua="Синхронізовано з: " data-en="Synced with: "></span>
            <strong>mishaborys@gmail.com</strong>
          </div>
          <button class="btn-outline-olx" style="width:auto;padding:.5rem 1.25rem;"
            onclick="openOAuthModal()"
            data-ua="Синхронізувати інший акаунт" data-en="Sync another account"></button>
        </div>

        <div id="s9_contacts" style="display:none;">
          <div class="d-flex align-items-center justify-content-between mb-1">
            <h5 class="fw-bold mb-0" data-ua="Контактні дані" data-en="Contact Details"></h5>
            <button class="cb" style="position:static;transform:none;margin-left:.5rem;"
              onclick="showComment('s9_no_import_btn')"><i class="bi bi-chat-fill"></i></button>
          </div>
          <p class="text-muted mb-4" style="font-size:.88rem;"
            data-ua="Дані, що використовуються при публікації оголошень."
            data-en="Data used when publishing listings."></p>
          <div class="mb-3">
            <label class="form-label fw-500 mb-1"
              data-ua="Контактна особа або назва компанії" data-en="Contact person or company name"></label>
            <input type="text" class="form-control" value="Misha Borys Auto Parts">
          </div>
          <div class="mb-3">
            <label class="form-label fw-500 mb-1" data-ua="Область" data-en="Region"></label>
            <select class="form-select">
              <option selected data-ua="Київська" data-en="Kyiv Region"></option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-500 mb-1" data-ua="Населений пункт" data-en="City"></label>
            <select class="form-select">
              <option selected data-ua="Київ" data-en="Kyiv"></option>
            </select>
          </div>
          <div class="mb-4">
            <label class="form-label fw-500 mb-1" data-ua="Телефон" data-en="Phone"></label>
            <input type="text" class="form-control" value="+380501234567">
          </div>
          <button class="btn-dark-olx" style="width:auto;padding:.55rem 1.25rem;"
            onclick="toast(currentLang==='ua'?'Збережено':'Saved')"
            data-ua="Зберегти" data-en="Save"></button>
        </div>

        <div id="s9_avto" style="display:none;">
          <div class="d-flex align-items-center justify-content-between mb-1">
            <h5 class="fw-bold mb-0" data-ua="Опис для AVTO.pro" data-en="AVTO.pro Description"></h5>
            <button class="cb" style="position:static;transform:none;margin-left:.5rem;"
              onclick="showComment('s9_avto_desc')"><i class="bi bi-chat-fill"></i></button>
          </div>
          <p class="text-muted mb-4" style="font-size:.88rem;"
            data-ua="Цей текст автоматично додається до всіх оголошень при імпорті з AVTO.pro."
            data-en="This text is automatically added to all listings when importing from AVTO.pro."></p>
          <div class="mb-3">
            <label class="form-label fw-500 mb-1"
              data-ua="Текст на початку опису" data-en="Text at the beginning of description"></label>
            <textarea class="form-control" rows="3"
              data-ua-placeholder="Введіть текст..." data-en-placeholder="Enter text..."></textarea>
          </div>
          <div class="mb-4">
            <label class="form-label fw-500 mb-1"
              data-ua="Текст наприкінці опису" data-en="Text at the end of description"></label>
            <textarea class="form-control" rows="3"
              data-ua-placeholder="Введіть текст..." data-en-placeholder="Enter text..."></textarea>
          </div>
          <button class="btn-dark-olx" style="width:auto;padding:.55rem 1.25rem;"
            onclick="toast(currentLang==='ua'?'Збережено':'Saved')"
            data-ua="Зберегти" data-en="Save"></button>
        </div>

        <div id="s9_pw" style="display:none;">
          <h5 class="fw-bold mb-4" data-ua="Зміна пароля" data-en="Change Password"></h5>
          <div class="mb-3">
            <label class="form-label fw-500 mb-1"
              data-ua="Поточний пароль" data-en="Current password"></label>
            <div class="input-group">
              <input type="password" id="s9_cur_pw" class="form-control"
                data-ua-placeholder="Введіть поточний пароль"
                data-en-placeholder="Enter current password"
                placeholder="Введіть поточний пароль">
              <button class="btn btn-outline-secondary" type="button"
                onclick="togglePw('s9_cur_pw',this)"><i class="bi bi-eye"></i></button>
            </div>
          </div>
          <div class="mb-1">
            <label class="form-label fw-500 mb-1"
              data-ua="Новий пароль" data-en="New password"></label>
            <div class="input-group">
              <input type="password" id="s9_new_pw" class="form-control"
                data-ua-placeholder="Мінімум 8 символів"
                data-en-placeholder="Minimum 8 characters"
                placeholder="Мінімум 8 символів"
                oninput="evalPw('s9_new_pw','s9_pwbar')">
              <button class="btn btn-outline-secondary" type="button"
                onclick="togglePw('s9_new_pw',this)"><i class="bi bi-eye"></i></button>
            </div>
          </div>
          <div class="pw-bar mb-1" id="s9_pwbar">
            <div class="pw-seg"></div><div class="pw-seg"></div>
            <div class="pw-seg"></div><div class="pw-seg"></div>
          </div>
          <small class="text-muted d-block mb-4" style="font-size:.75rem;"
            data-ua="Мінімум 8 символів: велика, мала літера та цифра"
            data-en="Minimum 8 characters: uppercase, lowercase and a digit"></small>
          <button class="btn-dark-olx" style="width:auto;padding:.55rem 1.25rem;"
            onclick="toast(currentLang==='ua'?'Пароль змінено':'Password changed')"
            data-ua="Зберегти" data-en="Save"></button>
        </div>

      </div>
    </div>
  </div>
</div>
