<!-- ═══════════════════════════════════════
     SCREEN 6 — ІМПОРТ ОГОЛОШЕНЬ
════════════════════════════════════════ -->
<div id="screen-6" class="screen" style="background:#f8f9fa;">
  <div data-component="app-header"></div>

  <div style="flex:1;display:flex;flex-direction:column;align-items:center;padding:2.5rem 2rem;overflow-y:auto;">

    <!-- Stepper -->
    <div style="max-width:680px;width:100%;margin-bottom:1.5rem;">
      <div class="import-stepper">
        <div class="import-step-item active" id="importStepDot1" onclick="goToImportStep(1)" style="cursor:pointer;">
          <div class="import-step-circle">1</div>
          <div class="import-step-label" data-ua="Платформа" data-en="Platform"></div>
        </div>
        <div class="import-step-line" id="importStepLine1"></div>
        <div class="import-step-item" id="importStepDot2" style="cursor:default;">
          <div class="import-step-circle">2</div>
          <div class="import-step-label" data-ua="Файл" data-en="File"></div>
        </div>
        <div class="import-step-line" id="importStepLine2"></div>
        <div class="import-step-item" id="importStepDot3" style="cursor:default;">
          <div class="import-step-circle">3</div>
          <div class="import-step-label" data-ua="Підтвердження" data-en="Confirm"></div>
        </div>
      </div>
    </div>

    <!-- ── STEP 1: Platform ── -->
    <div id="importStepPanel1" style="background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.08);padding:2.5rem;max-width:680px;width:100%;">
      <h4 class="fw-bold mb-1"
        data-ua="Оберіть платформу" data-en="Select platform"></h4>
      <p class="text-muted mb-4" style="font-size:.88rem;"
        data-ua="Звідки ви хочете імпортувати оголошення на OLX?"
        data-en="From which platform do you want to import listings to OLX?"></p>

      <div class="cb-host mb-4">
        <div class="d-flex gap-3">
          <div id="platformCardProm" class="import-platform-card" onclick="selectImportPlatform('prom')" style="flex:1;">
            <span class="badge-platform prom" style="font-size:.85rem;padding:.3rem .7rem;margin-bottom:.5rem;display:inline-block;">PROM.ua</span>
            <div style="font-size:.82rem;color:#888;" data-ua="Імпорт з Prom.ua" data-en="Import from Prom.ua"></div>
          </div>
          <div id="platformCardAvto" class="import-platform-card" onclick="selectImportPlatform('avto')" style="flex:1;">
            <span class="badge-platform avto" style="font-size:.85rem;padding:.3rem .7rem;margin-bottom:.5rem;display:inline-block;">AVTO.pro</span>
            <div style="font-size:.82rem;color:#888;" data-ua="Імпорт з Avto.pro" data-en="Import from Avto.pro"></div>
          </div>
        </div>
        <button class="cb" style="top:2px;right:2px;" onclick="showComment('import_platformSelection')"><i class="bi bi-chat-fill"></i></button>
      </div>

      <div class="d-flex justify-content-end">
        <button id="importNextBtn1" class="btn-dark-olx" style="width:auto;padding:.65rem 1.5rem;" onclick="validateAndGoToImportStep2()"
          data-ua="Далі →" data-en="Next →"></button>
      </div>
    </div>

    <!-- ── STEP 2: File upload ── -->
    <div id="importStepPanel2" style="display:none;background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.08);padding:2.5rem;max-width:680px;width:100%;">
      <h4 class="fw-bold mb-1"
        data-ua="Завантажте файл" data-en="Upload file"></h4>
      <p class="mb-4" style="font-size:.88rem;display:flex;align-items:center;gap:.5rem;">
        <span class="text-muted" data-ua="Платформа:" data-en="Platform:"></span>
        <span id="importSelectedPlatform"></span>
      </p>

      <div class="cb-host mb-3">
        <div class="status-block info" style="width:100%;display:flex;flex-wrap:wrap;gap:.3rem;">
          <i class="bi bi-info-circle-fill"></i>
          <span id="importWarningText"></span>
          <a href="#" onclick="openInstPanel();return false;"
             style="color:var(--olx-teal-dark);text-decoration:none;font-weight:500;"
             data-ua=" Переглянути інструкцію →" data-en=" View instructions →"></a>
        </div>
        <button class="cb" onclick="showComment('import_fileInstructions')"><i class="bi bi-chat-fill"></i></button>
      </div>

      <div class="cb-host mb-3">
        <div id="importDropZone" class="import-upload-zone"
          onclick="simulateImportFile()"
          ondragover="event.preventDefault()"
          ondrop="simulateImportFile();event.preventDefault()">
          <div id="importDropZoneEmpty">
            <i class="bi bi-folder2-open" style="font-size:2.5rem;color:#bbb;display:block;margin-bottom:.5rem;"></i>
            <div class="fw-500 mb-1"
              data-ua="Перетягніть файл або оберіть вручну"
              data-en="Drag and drop or choose manually"></div>
            <div style="font-size:.82rem;color:#aaa;">.xlsx, .xls</div>
            <button class="btn-outline-olx" style="width:auto;padding:.4rem 1rem;margin-top:.75rem;font-size:.85rem;"
              onclick="event.stopPropagation();simulateImportFile()"
              data-ua="Обрати файл" data-en="Choose file"></button>
          </div>
          <div id="importDropZoneDone" style="display:none;">
            <i class="bi bi-file-earmark-check" style="font-size:2rem;color:var(--olx-teal-dark);display:block;margin-bottom:.5rem;"></i>
            <strong id="importFileName"></strong>
            <div style="font-size:.85rem;color:#666;margin-top:.25rem;"
              data-ua="Файл містить: 146 оголошень"
              data-en="File contains: 146 listings"></div>
          </div>
        </div>
        <button class="cb" onclick="showComment('importDropZonezone')"><i class="bi bi-chat-fill"></i></button>
      </div>

      <div class="cb-host mb-3" style="display:inline-block;">
        <label style="display:flex;align-items:center;gap:.5rem;font-size:.9rem;cursor:pointer;">
          <input type="checkbox" id="importSkipNoPhoto" checked style="width:16px;height:16px;">
          <span data-ua="Не завантажувати оголошення без фото"
                data-en="Skip listings without photos"></span>
        </label>
        <button class="cb" style="top:-6px;right:-6px;" onclick="showComment('import_skipNoPhotoCheckbox')"><i class="bi bi-chat-fill"></i></button>
      </div>

      <div id="importAvtoExtraFields" style="display:none;">
        <div class="cb-host mb-3">
          <label class="form-label fw-500 mb-1" data-ua="Валюта файлу" data-en="File currency"></label>
          <select id="importCurrencySelect" class="form-select">
            <option value="uah">UAH — Гривня</option>
            <option value="usd" selected>USD — Долар США</option>
            <option value="eur">EUR — Євро</option>
          </select>
          <button class="cb" style="top:2px;right:2px;" onclick="showComment('importAvtoExtraFields')"><i class="bi bi-chat-fill"></i></button>
        </div>
        <div class="mb-3">
          <label class="form-label fw-500 mb-1"
            data-ua="Опис оголошень *"
            data-en="Listing description *"></label>
          <textarea id="importAvtoDescription" class="form-control" rows="3"
            data-ua-placeholder="Введіть опис, який буде доданий до всіх ваших оголошень..."
            data-en-placeholder="Enter a description that will be added to all your listings..."></textarea>
          <small class="text-muted" style="font-size:.78rem;line-height:1.55;display:block;margin-top:.35rem;"
            data-ua="Файл AVTO.pro не містить описів, тому ми використаємо цей текст для всіх завантажених оголошень. Якщо потрібно — описи можна оновити пізніше через OLX."
            data-en="The AVTO.pro file does not include descriptions, so this text will be used for all imported listings. If needed, you can update descriptions later via OLX."></small>
        </div>
      </div>

      <div class="d-flex align-items-center justify-content-between mt-2">
        <button class="btn-ghost" style="width:auto;" onclick="goToImportStep(1)"
          data-ua="← Назад" data-en="← Back"></button>
        <button id="importNextBtn2" class="btn-dark-olx" style="width:auto;padding:.65rem 1.5rem;" onclick="validateAndGoToImportStep3()"
          data-ua="Далі →" data-en="Next →"></button>
      </div>
    </div>

    <!-- ── STEP 3: Confirm ── -->
    <div id="importStepPanel3" style="display:none;background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.08);padding:2.5rem;max-width:680px;width:100%;">
      <h4 class="fw-bold mb-1"
        data-ua="Підтвердження імпорту" data-en="Confirm import"></h4>
      <p class="text-muted mb-3" style="font-size:.88rem;"
        data-ua="Перевірте параметри і запустіть імпорт."
        data-en="Review the settings and start the import."></p>

      <div style="border:1px solid #e0e0e0;border-radius:10px;padding:.5rem 1rem;margin-bottom:1.5rem;">
        <div class="import-summary-row">
          <i class="bi bi-collection import-summary-icon"></i>
          <div>
            <div style="font-size:.75rem;color:#999;margin-bottom:.15rem;"
              data-ua="Платформа" data-en="Platform"></div>
            <div id="importSummaryPlatform"></div>
          </div>
        </div>
        <div class="import-summary-row">
          <i class="bi bi-file-earmark-excel import-summary-icon" style="color:#217346;"></i>
          <div>
            <div style="font-size:.75rem;color:#999;margin-bottom:.15rem;"
              data-ua="Файл" data-en="File"></div>
            <div id="importSummaryFile" style="font-weight:500;"></div>
            <div style="font-size:.8rem;color:#888;"
              data-ua="146 оголошень" data-en="146 listings"></div>
          </div>
        </div>
        <div class="import-summary-row">
          <i class="bi bi-image import-summary-icon"></i>
          <div>
            <div style="font-size:.75rem;color:#999;margin-bottom:.15rem;"
              data-ua="Фото" data-en="Photos"></div>
            <div id="importSummaryNoPhoto" style="font-size:.9rem;"></div>
          </div>
        </div>
        <div class="import-summary-row" id="importSummaryCurrencyWrap" style="display:none;">
          <i class="bi bi-currency-exchange import-summary-icon"></i>
          <div>
            <div style="font-size:.75rem;color:#999;margin-bottom:.15rem;"
              data-ua="Валюта файлу" data-en="File currency"></div>
            <div id="importSummaryCurrency" style="font-size:.9rem;font-weight:500;"></div>
          </div>
        </div>
        <div class="import-summary-row" id="importSummaryDescWrap" style="display:none;">
          <i class="bi bi-text-left import-summary-icon"></i>
          <div style="flex:1;">
            <div style="font-size:.75rem;color:#999;margin-bottom:.15rem;"
              data-ua="Опис" data-en="Description"></div>
            <div id="importSummaryDesc" style="font-size:.88rem;color:#444;white-space:pre-wrap;word-break:break-word;"></div>
          </div>
        </div>
      </div>

      <!-- Contact details for this import (collapsible) -->
      <div class="cb-host" style="margin-bottom:1.5rem;">
        <div id="importContactCollapse"
          style="border:1px solid #e0e0e0;border-radius:10px;overflow:hidden;">
          <!-- Header row — always visible, click to toggle -->
          <div onclick="toggleImportContact()"
            style="display:flex;align-items:center;justify-content:space-between;padding:.65rem 1rem;cursor:pointer;user-select:none;background:#fafafa;">
            <div style="display:flex;align-items:center;gap:.6rem;">
              <i class="bi bi-person-circle" style="color:var(--olx-teal-dark);font-size:1.1rem;"></i>
              <span id="importContactSummaryLine" style="font-size:.88rem;color:#333;"></span>
            </div>
            <i id="importContactChevron" class="bi bi-chevron-down" style="font-size:.8rem;color:#888;transition:transform .2s;"></i>
          </div>
          <!-- Expanded edit form -->
          <div id="importContactForm" style="display:none;padding:1rem;border-top:1px solid #e0e0e0;background:#fff;">
            <p style="font-size:.78rem;color:#888;margin-bottom:.75rem;"
              data-ua="Зміни застосовуються лише до цього імпорту і не впливають на дані профілю."
              data-en="Changes apply to this import only and do not affect your profile data."></p>
            <div class="mb-2">
              <label class="form-label fw-500 mb-1" style="font-size:.85rem;"
                data-ua="Контактна особа" data-en="Contact name"></label>
              <input type="text" id="importContactName" class="form-control form-control-sm" oninput="refreshImportContactSummary()">
            </div>
            <div class="mb-2">
              <label class="form-label fw-500 mb-1" style="font-size:.85rem;"
                data-ua="Населений пункт" data-en="Location"></label>
              <input type="text" id="importContactLocation" class="form-control form-control-sm" oninput="refreshImportContactSummary()">
            </div>
            <div class="mb-2">
              <label class="form-label fw-500 mb-1" style="font-size:.85rem;"
                data-ua="Телефон" data-en="Phone"></label>
              <input type="text" id="importContactPhone" class="form-control form-control-sm" oninput="refreshImportContactSummary()">
            </div>
          </div>
        </div>
        <button class="cb" style="top:2px;right:2px;" onclick="showComment('import_contactOverride')"><i class="bi bi-chat-fill"></i></button>
      </div>

      <div class="d-flex align-items-center justify-content-between">
        <button class="btn-ghost" style="width:auto;" onclick="goToImportStep(2)"
          data-ua="← Назад" data-en="← Back"></button>
        <button class="btn-dark-olx" style="width:auto;padding:.65rem 1.5rem;" onclick="startImport()"
          data-ua="Імпортувати на OLX →" data-en="Import to OLX →"></button>
      </div>
    </div>

  </div>
</div>

<!-- Instruction Slide Panel -->
<div id="instPanelOverlay" onclick="closeInstPanel()"
  style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:1040;"></div>
<div id="instPanel" class="slide-panel" style="width:400px;right:-420px;">
  <div style="background:var(--olx-charcoal);color:#fff;padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
    <h6 class="mb-0 fw-bold" id="instPanel_title"></h6>
    <button onclick="closeInstPanel()" style="background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer;line-height:1;">&times;</button>
  </div>
  <div id="instPanel_body" style="flex:1;overflow-y:auto;padding:1.5rem;font-size:.9rem;line-height:1.7;"></div>
</div>
