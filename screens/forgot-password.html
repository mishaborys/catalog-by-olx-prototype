<!-- ═══════════════════════════════════════
     SCREEN 10 — ЗАБУЛИ ПАРОЛЬ
════════════════════════════════════════ -->
<div id="screen-10" class="screen">
  <div class="split-layout">

    <div data-component="left-panel" data-grid-id="iconGrid10"></div>

    <div class="split-right">
      <div class="form-card">

        <h3 class="fw-bold mb-1"
          data-ua="Забули пароль?" data-en="Forgot password?"></h3>
        <p class="text-muted mb-4" style="font-size:.88rem;"
          data-ua="Введіть свій email — ми надішлемо інструкцію для відновлення пароля."
          data-en="Enter your email — we'll send you a password reset link."></p>

        <div class="mb-4">
          <label class="form-label fw-500 mb-1" data-ua="Email" data-en="Email"></label>
          <input type="email" id="s10_email" class="form-control">
        </div>

        <button class="btn-dark-olx mb-2"
          onclick="s10Submit()"
          data-ua="Відновити пароль" data-en="Reset password"></button>

        <button class="btn-ghost"
          onclick="showScreen(2)"
          data-ua="Назад до входу" data-en="Back to sign in"></button>

        <!-- Success state (shown after submit) -->
        <div id="s10-success" style="display:none;" class="mt-2">
          <div class="s10-success-card">
            <div class="s10-success-icon"><i class="bi bi-envelope-check-fill"></i></div>
            <h6 class="fw-bold mb-1"
              data-ua="Лист надіслано" data-en="Email sent"></h6>
            <p class="text-muted mb-1" style="font-size:.87rem; line-height:1.6;"
              data-ua="Ми надіслали інструкцію для відновлення пароля на"
              data-en="We sent password reset instructions to"></p>
            <p class="s10-success-email mb-2" id="s10-shown-email"></p>
            <p class="text-muted" style="font-size:.83rem;"
              data-ua="Якщо листа немає — перевірте папку «Спам»."
              data-en="If you don't see it — check your spam folder."></p>
            <button class="btn-dark-olx mt-2"
              onclick="showScreen(2)"
              data-ua="Повернутись до входу" data-en="Back to sign in"></button>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>
