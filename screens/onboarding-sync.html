<!-- ═══════════════════════════════════════
     SCREEN 4 — ОНБОРДИНГ: OLX SYNC
════════════════════════════════════════ -->
<div id="screen-4" class="screen" style="background:#f8f9fa;">
  <div data-component="app-header"></div>

  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;">

    <div style="max-width:520px;width:100%;margin-bottom:1.25rem;text-align:center;">
      <p class="mb-2" style="font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#aaa;"
        data-ua="Початок роботи" data-en="Getting started"></p>
      <div class="onboarding-progress" style="gap:.5rem;justify-content:center;">
        <div class="onboarding-step active" onclick="showScreen(4)" style="cursor:pointer;" title="Step 1">1</div>
        <div class="onboarding-step-line"></div>
        <div class="onboarding-step" id="olxSyncStep2" onclick="showScreen(5)" style="cursor:default;" title="Step 2">2</div>
      </div>
    </div>

    <div style="background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.08);
                padding:2.5rem;max-width:520px;width:100%;">
      <h4 class="fw-bold mb-3" data-ua="Синхронізація з OLX" data-en="OLX Account Sync"></h4>

      <div class="cb-host mb-4">
        <p class="text-muted mb-0" style="font-size:.92rem;line-height:1.7;"
          data-ua="Щоб перенести ваші оголошення на OLX, нам потрібен доступ до вашого акаунту через API. Натисніть кнопку нижче — вас перенаправить на OLX.ua. Авторизуйтесь та підтвердіть доступ."
          data-en="To migrate your listings to OLX, we need access to your account via API. Click the button below — you will be redirected to OLX.ua. Sign in and confirm access."></p>
        <button class="cb" onclick="showComment('olxSync_instructions')"><i class="bi bi-chat-fill"></i></button>
      </div>

      <div id="olxSyncInitialState">
        <button class="btn-dark-olx" style="width:auto;padding:.6rem 1.5rem;"
          onclick="openOAuthModal()"
          data-ua="Надати доступ до OLX" data-en="Grant OLX access"></button>
      </div>

      <div id="olxSyncDoneState" style="display:none;">
        <div class="cb-host mb-3">
          <div style="display:flex;align-items:center;gap:.75rem;">
            <div class="olx-sync-success" style="flex:1;">
              <i class="bi bi-check-circle-fill"></i>
              <span data-ua="Підключено: " data-en="Connected: "></span>
              <strong>mishaborys@gmail.com</strong>
            </div>
            <button class="btn-sm-outline" onclick="openOAuthModal()" title="Change account" style="flex-shrink:0;padding:.3rem .6rem;">
              <i class="bi bi-arrow-repeat"></i>
            </button>
          </div>
          <button class="cb" onclick="showComment('olxSync_emailOrPhone')"><i class="bi bi-chat-fill"></i></button>
        </div>
      </div>

      <div class="d-flex justify-content-end mt-4">
        <div class="cb-host d-inline-block">
          <button id="olxSyncNextBtn" class="btn-teal" onclick="showScreen(5)" style="display:none;"
            data-ua="Далі →" data-en="Next →"></button>
          <button class="cb" onclick="showComment('olxSync_separateAccounts')"><i class="bi bi-chat-fill"></i></button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- OAuth Modal -->
<div class="modal fade" id="oauthModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered" style="max-width:420px;">
    <div class="modal-content">
      <div class="modal-body text-center p-5">
        <div style="font-size:2.2rem;font-weight:800;color:#3d6ee8;letter-spacing:-1px;margin-bottom:1rem;">OLX</div>
        <h5 class="fw-bold mb-2" data-ua="Авторизація OLX" data-en="OLX Authorization"></h5>
        <p class="text-muted mb-4" style="font-size:.9rem;"
          data-ua="Симуляція: Ви переходите на OLX.ua для авторизації. Натисніть «Дозволити доступ» щоб продовжити."
          data-en="Simulation: You are redirected to OLX.ua for authorization. Click «Allow access» to continue."></p>
        <div class="d-flex gap-2 justify-content-center">
          <button class="btn-dark-olx" style="width:auto;padding:.55rem 1.25rem;" onclick="completeOAuth()"
            data-ua="Дозволити доступ" data-en="Allow access"></button>
          <button class="btn-outline-olx" style="width:auto;padding:.5rem 1rem;" data-bs-dismiss="modal"
            data-ua="Скасувати" data-en="Cancel"></button>
        </div>
      </div>
    </div>
  </div>
</div>
