<!-- ═══════════════════════════════════════
     SCREEN 4 — ОНБОРДИНГ: OLX SYNC
════════════════════════════════════════ -->
<div id="screen-4" class="screen" style="background:#f8f9fa;">
  <div data-component="app-header"></div>

  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;">
    <div class="prog-indicator mb-4">
      <div class="prog-step active">1</div>
      <div class="prog-line"></div>
      <div class="prog-step" id="s4_step2">2</div>
    </div>

    <div style="background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.08);
                padding:2.5rem;max-width:520px;width:100%;">
      <h4 class="fw-bold mb-3" data-ua="Синхронізація з OLX" data-en="OLX Account Sync"></h4>

      <div class="cb-host mb-4">
        <p class="text-muted mb-0" style="font-size:.95rem;line-height:1.65;"
          data-ua="Натисніть кнопку нижче — вас перекине на OLX.ua. Увійдіть у свій акаунт та дайте додатку доступ."
          data-en="Click the button below — you will be redirected to OLX.ua. Sign in to your account and grant the app access."></p>
        <button class="cb" onclick="showComment('s4_text')"><i class="bi bi-chat-fill"></i></button>
      </div>

      <div id="s4_initial">
        <button class="btn-dark-olx" style="width:auto;padding:.6rem 1.5rem;"
          onclick="openOAuthModal()"
          data-ua="Синхронізувати" data-en="Synchronize"></button>
      </div>

      <div id="s4_synced" style="display:none;">
        <div class="cb-host d-inline-block mb-3">
          <div class="sync-ok-block">
            <i class="bi bi-check-circle-fill"></i>
            <span data-ua="Синхронізовано з акаунтом OLX: " data-en="Synced with OLX account: "></span>
            <strong>mishaborys@gmail.com</strong>
          </div>
          <button class="cb" onclick="showComment('s4_email_or_phone')"><i class="bi bi-chat-fill"></i></button>
        </div>
        <br>
        <button class="btn-outline-olx" style="width:auto;padding:.5rem 1.25rem;margin-bottom:.5rem;"
          onclick="openOAuthModal()"
          data-ua="Синхронізувати інший акаунт" data-en="Sync another account"></button>
      </div>

      <div class="d-flex justify-content-end mt-4">
        <div class="cb-host d-inline-block">
          <button id="s4_next" class="btn-teal" disabled onclick="showScreen(5)"
            data-ua="Далі →" data-en="Next →"></button>
          <button class="cb" onclick="showComment('s4_separate')"><i class="bi bi-chat-fill"></i></button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- OAuth Modal -->
<div class="modal fade" id="oauthModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered" style="max-width:420px;">
    <div class="modal-content">
      <div class="modal-body text-center p-5">
        <div style="font-size:2.2rem;font-weight:800;color:#3d6ee8;letter-spacing:-1px;margin-bottom:1rem;">OLX</div>
        <h5 class="fw-bold mb-2" data-ua="Авторизація OLX" data-en="OLX Authorization"></h5>
        <p class="text-muted mb-4" style="font-size:.9rem;"
          data-ua="Симуляція: Ви переходите на OLX.ua для авторизації. Натисніть «Дозволити доступ» щоб продовжити."
          data-en="Simulation: You are redirected to OLX.ua for authorization. Click «Allow access» to continue."></p>
        <div class="d-flex gap-2 justify-content-center">
          <button class="btn-dark-olx" style="width:auto;padding:.55rem 1.25rem;" onclick="completeOAuth()"
            data-ua="Дозволити доступ" data-en="Allow access"></button>
          <button class="btn-outline-olx" style="width:auto;padding:.5rem 1rem;" data-bs-dismiss="modal"
            data-ua="Скасувати" data-en="Cancel"></button>
        </div>
      </div>
    </div>
  </div>
</div>
