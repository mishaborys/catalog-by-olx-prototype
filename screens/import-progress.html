<!-- ═══════════════════════════════════════
     SCREEN 7 — ПРОГРЕС ІМПОРТУ
════════════════════════════════════════ -->
<div id="screen-7" class="screen" style="background:#f8f9fa;">
  <div data-component="app-header"></div>

  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;">
    <div style="background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.08);
                padding:3rem 2.5rem;max-width:520px;width:100%;text-align:center;">

      <i class="bi bi-arrow-repeat" id="importProgressSpinner"
        style="font-size:3rem;color:var(--olx-teal-dark);display:block;margin-bottom:1rem;"></i>

      <h4 class="fw-bold mb-1" data-ua="Імпорт в процесі..." data-en="Import in progress..."></h4>
      <p class="text-muted mb-3"><strong>avto_export.xlsx</strong></p>

      <div style="background:#e0e0e0;border-radius:6px;height:12px;overflow:hidden;margin-bottom:.5rem;">
        <div id="importProgressBar" style="width:0%;height:100%;background:var(--olx-teal-dark);
             border-radius:6px;transition:width .4s ease;"></div>
      </div>
      <div class="d-flex justify-content-between mb-4">
        <small class="text-muted" data-ua="Опрацьовано:" data-en="Processed:"></small>
        <small class="text-muted">
          <strong id="importProgressCount">0</strong> / 146
          <span data-ua=" оголошень" data-en=" listings"></span>
        </small>
      </div>

      <p class="text-muted mb-4" style="font-size:.85rem;"
        data-ua="Орієнтовний час завершення: ~2 хв"
        data-en="Estimated completion: ~2 min"></p>

      <div class="cb-host d-inline-block">
        <button class="btn-outline-olx" style="width:auto;padding:.55rem 1.5rem;"
          onclick="showScreen(6,'hist')"
          data-ua="Перейти до кабінету" data-en="Go to cabinet"></button>
        <button class="cb" onclick="showComment('importProgress_redirect')"><i class="bi bi-chat-fill"></i></button>
      </div>
    </div>
  </div>
</div>
