<!-- ═══════════════════════════════════════
     SCREEN 5 — ОНБОРДИНГ: КОНТАКТИ
════════════════════════════════════════ -->
<div id="screen-5" class="screen" style="background:#f8f9fa;">
  <div data-component="app-header"></div>

  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;overflow-y:auto;">

    <div style="max-width:520px;width:100%;margin-bottom:1.25rem;text-align:center;">
      <p class="mb-2" style="font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#aaa;"
        data-ua="Початок роботи" data-en="Getting started"></p>
      <div class="onboarding-progress" style="gap:.5rem;justify-content:center;">
        <div class="onboarding-step done" onclick="showScreen(4)" style="cursor:pointer;" title="Step 1"><i class="bi bi-check"></i></div>
        <div class="onboarding-step-line done"></div>
        <div class="onboarding-step active" style="cursor:default;">2</div>
      </div>
    </div>

    <div style="background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.08);
                padding:2.5rem;max-width:520px;width:100%;">
      <h4 class="fw-bold mb-1" data-ua="Контактні дані" data-en="Contact Details"></h4>
      <p class="text-muted mb-4" style="font-size:.88rem;"
        data-ua="Ці дані будуть використані для публікації оголошень на OLX."
        data-en="This information will be used when publishing listings on OLX."></p>

      <!-- Contact name -->
      <div class="mb-3">
        <label class="form-label fw-500 mb-1"
          data-ua="Контактна особа або назва компанії *"
          data-en="Contact person or company name *"></label>
        <input type="text" id="contactName" class="form-control" value="Misha Borys Auto Parts">
      </div>

      <!-- Location search dropdown -->
      <div class="mb-3">
        <label class="form-label fw-500 mb-1"
          data-ua="Населений пункт *"
          data-en="Location *"></label>
        <div class="dropdown w-100">
          <button class="form-select text-start d-flex align-items-center justify-content-between w-100"
            style="background:#fff;" type="button"
            data-bs-toggle="dropdown" data-bs-auto-close="outside">
            <span id="contactLocationLabel" style="color:#6c757d;"
              data-ua="Оберіть населений пункт..." data-en="Select location...">Оберіть населений пункт...</span>
            <i class="bi bi-chevron-down" style="font-size:.7rem;color:#aaa;flex-shrink:0;margin-left:.5rem;"></i>
          </button>
          <div class="dropdown-menu p-2 w-100" style="max-height:260px;overflow-y:auto;">
            <input type="text" class="form-control form-control-sm mb-2"
              data-ua="Пошук..." data-en="Search..."
              placeholder="Пошук..."
              oninput="filterContactLocation(this.value)">
            <div id="contactLocationOpts">
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Київ, Київська область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Бориспіль, Київська область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Бровари, Київська область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Біла Церква, Київська область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Харків, Харківська область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Ізюм, Харківська область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Одеса, Одеська область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Білгород-Дністровський, Одеська область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Ізмаїл, Одеська область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Дніпро, Дніпропетровська область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Кривий Ріг, Дніпропетровська область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Кам'янське, Дніпропетровська область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Нікополь, Дніпропетровська область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Львів, Львівська область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Трускавець, Львівська область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Дрогобич, Львівська область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Запоріжжя, Запорізька область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Мелітополь, Запорізька область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Вінниця, Вінницька область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Полтава, Полтавська область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Суми, Сумська область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Чернігів, Чернігівська область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Черкаси, Черкаська область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Рівне, Рівненська область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Луцьк, Волинська область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Тернопіль, Тернопільська область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Хмельницький, Хмельницька область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Івано-Франківськ, Івано-Франківська область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Ужгород, Закарпатська область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Чернівці, Чернівецька область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Кропивницький, Кіровоградська область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Херсон, Херсонська область</button>
              <button class="dropdown-item rounded" onclick="pickContactLocation(this)">Миколаїв, Миколаївська область</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Phone -->
      <div class="cb-host mb-4">
        <label class="form-label fw-500 mb-1" data-ua="Телефон *" data-en="Phone *"></label>
        <input type="text" id="contactPhone" class="form-control" value="+380501234567"
          placeholder="+380501234567, +380671234567">
        <small class="text-muted" style="font-size:.75rem;"
          data-ua="Кілька номерів через кому"
          data-en="Multiple numbers separated by comma"></small>
        <button class="cb" onclick="showComment('contacts_phone_regex')"><i class="bi bi-chat-fill"></i></button>
      </div>

      <!-- Buttons -->
      <div class="d-flex align-items-center justify-content-between mt-2">
        <button class="btn-ghost" style="width:auto;" onclick="showScreen(4)"
          data-ua="← Назад" data-en="← Back"></button>
        <div class="cb-host d-inline-block">
          <button class="btn-dark-olx" style="width:auto;padding:.65rem 1.5rem;" onclick="submitContactDetails()"
            data-ua="Готово" data-en="Done"></button>
          <button class="cb" onclick="showComment('contacts_noSubmitBtn')"><i class="bi bi-chat-fill"></i></button>
        </div>
      </div>
    </div>
  </div>
</div>
