<!-- ═══════════════════════════════════════
     SCREEN 3 — ПІДТВЕРДЖЕННЯ EMAIL
════════════════════════════════════════ -->
<div id="screen-3" class="screen" style="background:#f8f9fa;">
  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;">
    <div style="background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.08);
                padding:3rem 2.5rem;max-width:480px;width:100%;text-align:center;">

      <div style="font-size:4rem;margin-bottom:1rem;line-height:1;">📧</div>

      <h3 class="fw-bold mb-3"
        data-ua="Підтвердіть вашу електронну пошту"
        data-en="Verify your email address"></h3>

      <p class="text-muted mb-4" style="line-height:1.65;">
        <span data-ua="Ми надіслали листа на " data-en="We sent a verification email to "></span>
        <strong id="s3_email">user@example.com</strong>
        <span data-ua=". Перевірте пошту та папку «Спам» і перейдіть за посиланням для завершення реєстрації."
              data-en=". Please check your inbox and spam folder, then follow the link to complete registration."></span>
      </p>

      <div class="cb-host" style="display:inline-block;margin-bottom:1.25rem;">
        <button class="btn-outline-olx" style="width:auto;padding:.55rem 1.5rem;"
          onclick="toast(currentLang==='ua'?'Лист надіслано повторно':'Email resent')">
          <span data-ua="Надіслати повторно" data-en="Resend email"></span>
        </button>
        <button class="cb" onclick="showComment('s3_locked')"><i class="bi bi-chat-fill"></i></button>
      </div>

      <br>

      <a href="#" onclick="showScreen(1);return false;"
        style="color:#9e9e9e;font-size:.88rem;text-decoration:none;"
        data-ua="Вийти з акаунту" data-en="Sign out"></a>

      <hr style="margin:1.5rem 0;">

      <button onclick="simulateEmailConfirm()"
        style="background:none;border:none;color:#bbb;font-size:.78rem;cursor:pointer;text-decoration:underline;">
        <span data-ua="✓ Симулювати підтвердження email"
              data-en="✓ Simulate email confirmation"></span>
      </button>

    </div>
  </div>
</div>
