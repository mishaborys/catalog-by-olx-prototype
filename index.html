<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalog by OLX — Prototype</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<!-- ═══════════════════════════════════════
     GLOBAL: Comment Modal
════════════════════════════════════════ -->
<div class="modal fade" id="commentModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header" style="background:var(--olx-charcoal);color:#fff;">
        <h6 class="modal-title mb-0">
          <i class="bi bi-chat-fill me-2" style="color:var(--olx-yellow-dark)"></i>
          Design Note
        </h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="commentBody" style="white-space:pre-line;line-height:1.65;font-size:.92rem;"></div>
    </div>
  </div>
</div>

<!-- GLOBAL: Toasts -->
<div id="toast-container"></div>

<!-- GLOBAL: Language Switcher -->
<div id="lang-sw">
  <button class="lang-btn active" onclick="setLang('ua')">UA</button>
  <button class="lang-btn" onclick="setLang('en')">EN</button>
</div>

<!-- GLOBAL: Screen Navigator -->
<button id="nav-btn" onclick="toggleNav()">≡ All screens</button>
<div id="nav-panel">
  <div class="nav-item-s" data-screen="1" onclick="showScreen(1)">1 — Registration</div>
  <div class="nav-item-s" data-screen="2" onclick="showScreen(2)">2 — Login</div>
  <div class="nav-item-s" data-screen="3" onclick="showScreen(3)">3 — Email Verification</div>
  <div class="nav-item-s" data-screen="4" onclick="showScreen(4)">4 — Onboarding: OLX Sync</div>
  <div class="nav-item-s" data-screen="5" onclick="showScreen(5)">5 — Onboarding: Contacts</div>
  <div class="nav-item-s" data-screen="6" onclick="showScreen(6)">6 — Cabinet (Dashboard)</div>
  <div class="nav-item-s" data-screen="7" onclick="showScreen(7)">7 — Import Progress</div>
  <div class="nav-item-s" data-screen="8" onclick="showScreen(8)">8 — Failed Listings</div>
  <div class="nav-item-s" data-screen="9" onclick="showScreen(9)">9 — Settings</div>
  <div class="nav-item-s" data-screen="10" onclick="showScreen(10)">10 — Forgot Password</div>
</div>



<!-- Screens are loaded dynamically from screens/ folder -->
<div id="screens-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
