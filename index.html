<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalog by OLX — Prototype</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<!-- ═══════════════════════════════════════
     GLOBAL: Comment Modal
════════════════════════════════════════ -->
<div class="modal fade" id="commentModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header" style="background:var(--olx-charcoal);color:#fff;">
        <h6 class="modal-title mb-0">
          <i class="bi bi-chat-fill me-2" style="color:var(--olx-yellow-dark)"></i>
          <span data-ua="Зауваження до дизайну" data-en="Design Note"></span>
        </h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="commentBody" style="white-space:pre-line;line-height:1.65;font-size:.92rem;"></div>
    </div>
  </div>
</div>

<!-- GLOBAL: Toasts -->
<div id="toast-container"></div>

<!-- GLOBAL: Language Switcher -->
<div id="lang-sw">
  <button class="lang-btn active" onclick="setLang('ua')">UA</button>
  <button class="lang-btn" onclick="setLang('en')">EN</button>
</div>

<!-- GLOBAL: Screen Navigator -->
<button id="nav-btn" onclick="toggleNav()">
  ≡ <span data-ua="Всі екрани" data-en="All screens"></span>
</button>
<div id="nav-panel">
  <div class="nav-item-s" data-screen="1" onclick="showScreen(1)">
    <span data-ua="1 — Реєстрація" data-en="1 — Registration"></span>
  </div>
  <div class="nav-item-s" data-screen="2" onclick="showScreen(2)">
    <span data-ua="2 — Логін" data-en="2 — Login"></span>
  </div>
  <div class="nav-item-s" data-screen="3" onclick="showScreen(3)">
    <span data-ua="3 — Підтвердження Email" data-en="3 — Email Verification"></span>
  </div>
  <div class="nav-item-s" data-screen="4" onclick="showScreen(4)">
    <span data-ua="4 — Онбординг: OLX Sync" data-en="4 — Onboarding: OLX Sync"></span>
  </div>
  <div class="nav-item-s" data-screen="5" onclick="showScreen(5)">
    <span data-ua="5 — Онбординг: Контакти" data-en="5 — Onboarding: Contacts"></span>
  </div>
  <div class="nav-item-s" data-screen="6" onclick="showScreen(6)">
    <span data-ua="6 — Кабінет (Дашборд)" data-en="6 — Cabinet (Dashboard)"></span>
  </div>
  <div class="nav-item-s" data-screen="7" onclick="showScreen(7)">
    <span data-ua="7 — Прогрес імпорту" data-en="7 — Import Progress"></span>
  </div>
  <div class="nav-item-s" data-screen="8" onclick="showScreen(8)">
    <span data-ua="8 — Зафейлені оголошення" data-en="8 — Failed Listings"></span>
  </div>
  <div class="nav-item-s" data-screen="9" onclick="showScreen(9)">
    <span data-ua="9 — Налаштування" data-en="9 — Settings"></span>
  </div>
</div>



<!-- Screens are loaded dynamically from screens/ folder -->
<div id="screens-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
